<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kota Palangka Raya - Jantung Kalimantan Tengah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hijau-hutan': '#2E7D32',
                        'hijau-gelap': '#1B5E20',
                        'emas-dayak': '#D4AF37',
                        'emas-terang': '#F4D03F',
                        'coklat-kayu': '#6D4C41',
                        'coklat-gelap': '#3E2723',
                        'krem': '#F5E6C8',
                        'krem-gelap': '#E6D5B8',
                        'hitam-arang': '#1E1E1E',
                        'hitam-lembut': '#2D2D2D',
                    },
                    fontFamily: {
                        'display': ['Playfair Display', 'serif'],
                        'body': ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 20s linear infinite',
                        'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1E1E1E;
            overflow-x: hidden;
        }

        .font-display {
            font-family: 'Playfair Display', serif;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #1E1E1E;
        }
        ::-webkit-scrollbar-thumb {
            background: #D4AF37;
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #F4D03F;
        }

        /* Dayak Pattern Background */
        .dayak-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23D4AF37' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        /* Glassmorphism */
        .glass {
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .glass-light {
            background: rgba(245, 230, 200, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        /* Text Gradient */
        .text-gradient-gold {
            background: linear-gradient(135deg, #D4AF37 0%, #F4D03F 50%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Hero Video Overlay */
        .hero-overlay {
            background: linear-gradient(
                to bottom,
                rgba(30, 30, 30, 0.3) 0%,
                rgba(30, 30, 30, 0.6) 50%,
                rgba(30, 30, 30, 0.95) 100%
            );
        }

        /* Timeline Line */
        .timeline-line {
            background: linear-gradient(to bottom, #D4AF37, #2E7D32, #D4AF37);
        }

        /* Card Hover Effects */
        .card-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.15);
        }

        /* Image Zoom */
        .img-zoom {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .img-zoom:hover {
            transform: scale(1.1);
        }

        /* Lightbox */
        .lightbox {
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        /* Parallax */
        .parallax-bg {
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        /* Navigation Active State */
        .nav-link {
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #D4AF37;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        /* Counter Animation */
        @property --num {
            syntax: '<integer>';
            initial-value: 0;
            inherits: false;
        }

        /* Map Marker Pulse */
        .marker-pulse {
            animation: markerPulse 2s ease-in-out infinite;
        }
        @keyframes markerPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        /* Loading Screen */
        .loader {
            border-top-color: #D4AF37;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Section Reveal */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Ornament Rotation */
        .ornament-rotate {
            animation: rotateOrnament 30s linear infinite;
        }
        @keyframes rotateOrnament {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Mobile Menu */
        .mobile-menu {
            transform: translateX(100%);
            transition: transform 0.3s ease-in-out;
        }
        .mobile-menu.open {
            transform: translateX(0);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Dayak Ornament SVG Component
        const DayakOrnament = ({ className = "", size = 40 }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 5 L55 20 L70 15 L60 25 L75 35 L55 35 L50 50 L45 35 L25 35 L40 25 L30 15 L45 20 Z" fill="currentColor" opacity="0.8"/>
                <circle cx="50" cy="50" r="8" fill="currentColor" opacity="0.6"/>
                <path d="M20 50 Q35 35 50 50 Q65 65 50 50 Q35 35 20 50" stroke="currentColor" strokeWidth="2" fill="none" opacity="0.4"/>
                <path d="M80 50 Q65 35 50 50 Q35 65 50 50 Q65 35 80 50" stroke="currentColor" strokeWidth="2" fill="none" opacity="0.4"/>
            </svg>
        );

        // Burung Enggang SVG
        const BurungEnggang = ({ className = "" }) => (
            <svg className={className} viewBox="0 0 200 150" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M40 80 Q60 40 100 50 Q140 60 160 30 Q150 70 130 80 Q150 90 140 110 Q120 100 100 110 Q80 120 60 100 Q40 90 40 80Z" fill="currentColor" opacity="0.15"/>
                <path d="M100 50 Q120 30 140 40 Q130 60 110 65 Q100 60 100 50" fill="currentColor" opacity="0.2"/>
                <path d="M60 100 Q80 110 100 105 Q90 115 70 110 Q60 105 60 100" fill="currentColor" opacity="0.2"/>
            </svg>
        );

        // Loading Screen
        const LoadingScreen = ({ onLoad }) => {
            const [progress, setProgress] = useState(0);
            
            useEffect(() => {
                const interval = setInterval(() => {
                    setProgress(prev => {
                        if (prev >= 100) {
                            clearInterval(interval);
                            setTimeout(onLoad, 500);
                            return 100;
                        }
                        return prev + Math.random() * 15;
                    });
                }, 200);
                return () => clearInterval(interval);
            }, [onLoad]);

            return (
                <div className={`fixed inset-0 z-50 bg-hitam-arang flex flex-col items-center justify-center transition-opacity duration-700 ${progress >= 100 ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
                    <div className="relative mb-8">
                        <DayakOrnament className="text-emas-dayak ornament-rotate" size={80} />
                    </div>
                    <h2 className="font-display text-3xl md:text-4xl text-krem mb-4 tracking-wider">Palangka Raya</h2>
                    <div className="w-64 h-1 bg-hitam-lembut rounded-full overflow-hidden">
                        <div 
                            className="h-full bg-gradient-to-r from-emas-dayak to-emas-terang transition-all duration-300 ease-out"
                            style={{ width: `${Math.min(progress, 100)}%` }}
                        />
                    </div>
                    <p className="text-krem-gelap mt-4 text-sm font-body">Memuat pengalaman digital...</p>
                </div>
            );
        };

        // Navigation
        const Navigation = ({ activeSection }) => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navItems = [
                { id: 'beranda', label: 'Beranda' },
                { id: 'sejarah', label: 'Sejarah' },
                { id: 'budaya', label: 'Budaya' },
                { id: 'kuliner', label: 'Kuliner' },
                { id: 'wisata', label: 'Wisata' },
                { id: 'modern', label: 'Perkembangan' },
                { id: 'peta', label: 'Peta' },
            ];

            const scrollTo = (id) => {
                const el = document.getElementById(id);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth' });
                    setMobileOpen(false);
                }
            };

            return (
                <>
                    <nav className={`fixed top-0 left-0 right-0 z-40 transition-all duration-500 ${isScrolled ? 'glass py-3' : 'bg-transparent py-6'}`}>
                        <div className="container mx-auto px-6 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => scrollTo('beranda')}>
                                <DayakOrnament className="text-emas-dayak" size={32} />
                                <span className={`font-display text-xl md:text-2xl font-bold ${isScrolled ? 'text-krem' : 'text-white'}`}>
                                    Palangka Raya
                                </span>
                            </div>

                            {/* Desktop Nav */}
                            <div className="hidden lg:flex items-center gap-8">
                                {navItems.map(item => (
                                    <button
                                        key={item.id}
                                        onClick={() => scrollTo(item.id)}
                                        className={`nav-link text-sm font-medium tracking-wide transition-colors ${activeSection === item.id ? 'text-emas-dayak active' : isScrolled ? 'text-krem hover:text-emas-dayak' : 'text-white/80 hover:text-white'}`}
                                    >
                                        {item.label}
                                    </button>
                                ))}
                            </div>

                            {/* Mobile Toggle */}
                            <button 
                                className="lg:hidden text-emas-dayak text-2xl"
                                onClick={() => setMobileOpen(!mobileOpen)}
                            >
                                <i className={`fas ${mobileOpen ? 'fa-times' : 'fa-bars'}`}></i>
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Menu */}
                    <div className={`mobile-menu fixed inset-y-0 right-0 w-72 bg-hitam-arang/95 backdrop-blur-xl z-50 lg:hidden ${mobileOpen ? 'open' : ''}`}>
                        <div className="p-8 pt-24">
                            {navItems.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => scrollTo(item.id)}
                                    className={`block w-full text-left py-4 text-lg font-display border-b border-white/10 ${activeSection === item.id ? 'text-emas-dayak' : 'text-krem'}`}
                                >
                                    {item.label}
                                </button>
                            ))}
                        </div>
                    </div>
                    {mobileOpen && <div className="fixed inset-0 bg-black/50 z-40 lg:hidden" onClick={() => setMobileOpen(false)} />}
                </>
            );
        };

        // Hero Section
        const HeroSection = () => {
            const [videoLoaded, setVideoLoaded] = useState(false);

            return (
                <section id="beranda" className="relative h-screen w-full overflow-hidden">
                    {/* Background Video Placeholder with Parallax-like effect */}
                    <div className="absolute inset-0">
                        <div 
                            className="absolute inset-0 bg-cover bg-center transform scale-110"
                            style={{
                                backgroundImage: `url('https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?q=80&w=2072&auto=format&fit=crop')`,
                                filter: 'brightness(0.6)'
                            }}
                        />
                        <div className="absolute inset-0 bg-gradient-to-b from-hitam-arang/40 via-transparent to-hitam-arang" />
                    </div>

                    {/* Floating Ornaments */}
                    <div className="absolute top-20 left-10 opacity-20 animate-float">
                        <DayakOrnament className="text-emas-dayak" size={60} />
                    </div>
                    <div className="absolute bottom-40 right-10 opacity-20 animate-float-delayed">
                        <DayakOrnament className="text-emas-dayak" size={40} />
                    </div>

                    {/* Content */}
                    <div className="relative z-10 h-full flex flex-col items-center justify-center text-center px-6">
                        <div className="mb-6 animate-fade-in-up">
                            <DayakOrnament className="text-emas-dayak mx-auto mb-4" size={50} />
                            <p className="text-emas-dayak text-sm md:text-base tracking-[0.3em] uppercase font-medium mb-4">
                                Selamat Datang di
                            </p>
                        </div>
                        
                        <h1 className="font-display text-5xl md:text-7xl lg:text-8xl font-black text-white mb-6 leading-tight animate-fade-in-up" style={{animationDelay: '0.2s'}}>
                            Palangka Raya
                        </h1>
                        
                        <p className="font-display text-xl md:text-2xl lg:text-3xl text-krem/90 max-w-3xl mb-10 animate-fade-in-up" style={{animationDelay: '0.4s'}}>
                            Jantung Kalimantan Tengah yang Kaya Budaya, Alam, dan Inovasi
                        </p>

                        <div className="flex flex-col sm:flex-row gap-4 animate-fade-in-up" style={{animationDelay: '0.6s'}}>
                            <button 
                                onClick={() => document.getElementById('wisata').scrollIntoView({ behavior: 'smooth' })}
                                className="group relative px-8 py-4 bg-emas-dayak text-hitam-arang font-bold rounded-full overflow-hidden transition-all hover:shadow-[0_0_30px_rgba(212,175,55,0.4)]"
                            >
                                <span className="relative z-10 flex items-center gap-2">
                                    Jelajahi Kota
                                    <i className="fas fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
                                </span>
                                <div className="absolute inset-0 bg-emas-terang transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-300" />
                            </button>
                            
                            <button 
                                onClick={() => document.getElementById('peta').scrollIntoView({ behavior: 'smooth' })}
                                className="px-8 py-4 border-2 border-krem/30 text-krem font-bold rounded-full hover:bg-krem/10 hover:border-emas-dayak transition-all flex items-center gap-2"
                            >
                                <i className="fas fa-map-marked-alt"></i>
                                Lihat Peta
                            </button>
                        </div>
                    </div>

                    {/* Scroll Indicator */}
                    <div className="absolute bottom-10 left-1/2 -translate-x-1/2 animate-bounce">
                        <div className="w-6 h-10 border-2 border-krem/30 rounded-full flex justify-center pt-2">
                            <div className="w-1 h-3 bg-emas-dayak rounded-full animate-pulse" />
                        </div>
                    </div>
                </section>
            );
        };

        // Sejarah Section - Interactive Timeline
        const SejarahSection = () => {
            const [activeTimeline, setActiveTimeline] = useState(0);
            const sectionRef = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) setIsVisible(true);
                    },
                    { threshold: 0.2 }
                );
                if (sectionRef.current) observer.observe(sectionRef.current);
                return () => observer.disconnect();
            }, []);

            const timelineData = [
                {
                    year: '1957',
                    title: 'Berdirinya Palangka Raya',
                    desc: 'Palangka Raya didirikan sebagai ibu kota Provinsi Kalimantan Tengah berdasarkan UU No. 10 Tahun 1957. Nama "Palangka Raya" berasal dari bahasa Dayak Ngaju yang berarti "Tanah yang Suci".',
                    image: 'https://images.unsplash.com/photo-1528164344705-47542687000d?q=80&w=1000&auto=format&fit=crop'
                },
                {
                    year: '1957',
                    title: 'Peresmian oleh Presiden Soekarno',
                    desc: 'Presiden Soekarno meresmikan Palangka Raya pada 17 Juli 1957. Beliau memiliki visi menjadikan kota ini sebagai ibu kota Indonesia di masa depan karena letaknya yang strategis di tengah kepulauan.',
                    image: 'https://images.unsplash.com/photo-1545562083-a600704fa46e?q=80&w=1000&auto=format&fit=crop'
                },
                {
                    year: '1958-1990',
                    title: 'Perkembangan Ibu Kota',
                    desc: 'Palangka Raya berkembang pesat sebagai pusat pemerintahan, pendidikan, dan ekonomi Kalimantan Tengah. Pembangunan infrastruktur dasar dan fasilitas publik dilakukan secara masif.',
                    image: 'https://images.unsplash.com/photo-1486325212027-8081e485255e?q=80&w=1000&auto=format&fit=crop'
                },
                {
                    year: '2000-Sekarang',
                    title: 'Era Modernisasi',
                    desc: 'Memasuki era modern, Palangka Raya tumbuh menjadi kota metropolitan dengan visi Smart City, ekowisata, dan pusat pendidikan unggulan di Kalimantan.',
                    image: 'https://images.unsplash.com/photo-1449824913935-59a10b8d2000?q=80&w=1000&auto=format&fit=crop'
                }
            ];

            return (
                <section id="sejarah" ref={sectionRef} className="relative py-24 bg-hitam-arang dayak-pattern overflow-hidden">
                    <div className="container mx-auto px-6">
                        <div className={`text-center mb-16 transition-all duration-1000 ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'}`}>
                            <DayakOrnament className="text-emas-dayak mx-auto mb-4" size={40} />
                            <h2 className="font-display text-4xl md:text-5xl font-bold text-krem mb-4">Sejarah Kota</h2>
                            <p className="text-krem-gelap max-w-2xl mx-auto">Perjalanan Panjang Palangka Raya dari Tanah Suci menjadi Kota Metropolitan</p>
                        </div>

                        <div className="grid lg:grid-cols-2 gap-12 items-center">
                            {/* Timeline Navigation */}
                            <div className={`space-y-6 transition-all duration-1000 delay-300 ${isVisible ? 'opacity-100 translate-x-0' : 'opacity-0 -translate-x-10'}`}>
                                <div className="relative pl-8 border-l-2 border-emas-dayak/30 space-y-8">
                                    {timelineData.map((item, idx) => (
                                        <div 
                                            key={idx}
                                            className={`relative cursor-pointer group transition-all duration-300 ${activeTimeline === idx ? 'opacity-100' : 'opacity-50 hover:opacity-80'}`}
                                            onClick={() => setActiveTimeline(idx)}
                                        >
                                            <div className={`absolute -left-[41px] top-0 w-5 h-5 rounded-full border-4 transition-all duration-300 ${activeTimeline === idx ? 'bg-emas-dayak border-emas-terang scale-125' : 'bg-hitam-arang border-emas-dayak/50'}`} />
                                            <span className={`font-display text-2xl font-bold ${activeTimeline === idx ? 'text-emas-dayak' : 'text-krem-gelap'}`}>
                                                {item.year}
                                            </span>
                                            <h3 className={`text-xl font-bold mt-1 ${activeTimeline === idx ? 'text-krem' : 'text-krem-gelap'}`}>
                                                {item.title}
                                            </h3>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Content Display */}
                            <div className={`transition-all duration-1000 delay-500 ${isVisible ? 'opacity-100 translate-x-0' : 'opacity-0 translate-x-10'}`}>
                                <div className="relative rounded-2xl overflow-hidden group">
                                    <div className="aspect-[4/3] overflow-hidden">
                                        <img 
                                            src={timelineData[activeTimeline].image} 
                                            alt={timelineData[activeTimeline].title}
                                            className="w-full h-full object-cover img-zoom"
                                        />
                                    </div>
                                    <div className="absolute inset-0 bg-gradient-to-t from-hitam-arang via-hitam-arang/20 to-transparent" />
                                    <div className="absolute bottom-0 left-0 right-0 p-8">
                                        <div className="glass rounded-xl p-6 border border-emas-dayak/20">
                                            <h3 className="font-display text-2xl font-bold text-emas-dayak mb-3">
                                                {timelineData[activeTimeline].title}
                                            </h3>
                                            <p className="text-krem leading-relaxed">
                                                {timelineData[activeTimeline].desc}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // Budaya Section
        const BudayaSection = () => {
            const [expandedCard, setExpandedCard] = useState(null);
            const sectionRef = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => { if (entry.isIntersecting) setIsVisible(true); },
                    { threshold: 0.1 }
                );
                if (sectionRef.current) observer.observe(sectionRef.current);
                return () => observer.disconnect();
            }, []);

            const cultures = [
                {
                    title: 'Suku Dayak Ngaju',
                    icon: 'fa-users',
                    desc: 'Suku Dayak Ngaju merupakan suku terbesar di Kalimantan Tengah. Mereka memiliki kekayaan budaya, tradisi, dan pengetahuan adat yang diwariskan secara turun-temurun.',
                    detail: 'Suku Dayak Ngaju dikenal dengan kearifan lokalnya dalam menjaga keseimbangan alam. Sistem kepercayaan Kaharingan menjadi ciri khas spiritualitas masyarakat Dayak Ngaju yang masih lestari hingga kini.',

        // Modern Development Section with Counters
        const ModernSection = () => {
            const [counters, setCounters] = useState({
                education: 0,
                infrastructure: 0,
                tourism: 0,
                creative: 0,
                smartcity: 0
            });
            const [hasAnimated, setHasAnimated] = useState(false);
            const sectionRef = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting && !hasAnimated) {
                            setHasAnimated(true);
                            animateCounters();
                        }
                    },
                    { threshold: 0.3 }
                );
                if (sectionRef.current) observer.observe(sectionRef.current);
                return () => observer.disconnect();
            }, [hasAnimated]);

            const animateCounters = () => {
                const targets = { education: 85, infrastructure: 78, tourism: 92, creative: 65, smartcity: 70 };
                const duration = 2000;
                const steps = 60;
                
                let step = 0;
                const interval = setInterval(() => {
                    step++;
                    const progress = step / steps;
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    
                    setCounters({
                        education: Math.round(targets.education * easeOut),
                        infrastructure: Math.round(targets.infrastructure * easeOut),
                        tourism: Math.round(targets.tourism * easeOut),
                        creative: Math.round(targets.creative * easeOut),
                        smartcity: Math.round(targets.smartcity * easeOut)
                    });

                    if (step >= steps) clearInterval(interval);
                }, duration / steps);
            };

                { label: 'Pendidikan', value: counters.education, icon: 'fa-graduation-cap', color: 'text-blue-400' },

                const colors = {
                    nature: 'bg-emerald-500',
                    river: 'bg-blue-500',
                    landmark: 'bg-emas-dayak',
                    culture: 'bg-purple-500',
                    religion: 'bg-green-600',
                    education: 'bg-red-500',
                    market: 'bg-orange-500'
                };
                return colors[type] || 'bg-emas-dayak';
            };

            return (
                <section id="peta" ref={sectionRef} className="relative py-24 bg-hitam-lembut overflow-hidden">
                    <div className="container mx-auto px-6">
                        <div className={`text-center mb-16 transition-all duration-1000 ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'}`}>
                            <DayakOrnament className="text-emas-dayak mx-auto mb-4" size={40} />
                            <h2 className="font-display text-4xl md:text-5xl font-bold text-krem mb-4">Peta Interaktif</h2>
                            <p className="text-krem-gelap max-w-2xl mx-auto">Jelajahi Lokasi-Lokasi Menarik di Kota Palangka Raya</p>
                        </div>

                        <div className={`relative max-w-5xl mx-auto transition-all duration-1000 delay-300 ${isVisible ? 'opacity-100 scale-100' : 'opacity-0 scale-95'}`}>
                            {/* Map Container */}
                            <div className="relative aspect-[16/9] bg-hitam-arang rounded-3xl overflow-hidden border border-emas-dayak/20 shadow-2xl">
                                {/* Stylized Map Background */}
                                <div className="absolute inset-0">
                                    <svg className="w-full h-full opacity-30" viewBox="0 0 100 100" preserveAspectRatio="none">
                                        {/* River Kahayan */}
                                        <path d="M45 0 Q48 20 50 45 Q52 70 48 100" stroke="#3B82F6" strokeWidth="2" fill="none" opacity="0.6"/>
                                        {/* Forest Sebangau */}
                                        <ellipse cx="30" cy="60" rx="12" ry="15" fill="#10B981" opacity="0.2"/>
                                        {/* City Grid */}
                                        <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
                                            <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#D4AF37" strokeWidth="0.1" opacity="0.3"/>
                                        </pattern>
                                        <rect width="100" height="100" fill="url(#grid)" />
                                    </svg>
                                </div>

                                {/* Map Labels */}
                                <div className="absolute top-4 left-4 glass px-4 py-2 rounded-lg">
                                    <span className="text-emas-dayak text-xs font-bold tracking-wider">PALANGKA RAYA</span>
                                </div>

                                {/* Markers */}
                                {locations.map((loc) => (
                                    <div
                                        key={loc.id}
                                        className="absolute transform -translate-x-1/2 -translate-y-1/2 cursor-pointer group"
                                        style={{ left: `${loc.x}%`, top: `${loc.y}%` }}
                                        onClick={() => setActiveMarker(activeMarker === loc.id ? null : loc.id)}
                                    >
                                        <div className={`relative w-4 h-4 rounded-full ${getMarkerColor(loc.type)} marker-pulse shadow-lg`}>
                                            <div className={`absolute inset-0 rounded-full ${getMarkerColor(loc.type)} animate-ping opacity-75`} />
                                        </div>
                                        
                                        {/* Tooltip */}
                                        <div className={`absolute bottom-full left-1/2 -translate-x-1/2 mb-2 whitespace-nowrap transition-all duration-300 ${activeMarker === loc.id ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-2 pointer-events-none'}`}>
                                            <div className="glass px-4 py-2 rounded-lg border border-emas-dayak/30">
                                                <p className="text-krem text-sm font-bold">{loc.name}</p>
                                                <p className="text-krem-gelap text-xs capitalize">{loc.type}</p>
                                            </div>
                                            <div className="w-2 h-2 bg-emas-dayak rotate-45 absolute -bottom-1 left-1/2 -translate-x-1/2" />
                                        </div>
                                    </div>
                                ))}

                                {/* Map Controls */}
                                <div className="absolute bottom-4 right-4 flex flex-col gap-2">
                                    <button className="w-10 h-10 glass rounded-lg flex items-center justify-center text-krem hover:bg-emas-dayak hover:text-hitam-arang transition-all">
                                        <i className="fas fa-plus"></i>
                                    </button>
                                    <button className="w-10 h-10 glass rounded-lg flex items-center justify-center text-krem hover:bg-emas-dayak hover:text-hitam-arang transition-all">
                                        <i className="fas fa-minus"></i>
                                    </button>
                                </div>
                            </div>

                            {/* Location List */}
                            <div className="mt-8 grid grid-cols-2 md:grid-cols-4 gap-4">
                                {locations.map((loc) => (
                                    <button
                                        key={loc.id}
                                        onClick={() => setActiveMarker(activeMarker === loc.id ? null : loc.id)}
                                        className={`flex items-center gap-3 p-3 rounded-xl transition-all ${activeMarker === loc.id ? 'bg-emas-dayak/20 border border-emas-dayak/50' : 'glass hover:bg-white/5'}`}
                                    >
                                        <div className={`w-3 h-3 rounded-full ${getMarkerColor(loc.type)}`} />
                                        <span className="text-krem text-sm font-medium text-left">{loc.name}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // Footer
        const Footer = () => (
            <footer className="relative bg-hitam-arang border-t border-emas-dayak/20 pt-16 pb-8 overflow-hidden">
                <div className="absolute inset-0 dayak-pattern opacity-10" />
                
                <div className="container mx-auto px-6 relative z-10">
                    <div className="grid md:grid-cols-4 gap-12 mb-12">
                        <div className="md:col-span-2">
                            <div className="flex items-center gap-3 mb-6">
                                <DayakOrnament className="text-emas-dayak" size={40} />
                                <span className="font-display text-2xl font-bold text-krem">Palangka Raya</span>
                            </div>
                            <p className="text-krem-gelap leading-relaxed max-w-md mb-6">
                                Kota Palangka Raya, jantung Kalimantan Tengah yang terus berkembang 
                                menjadi kota modern sambil menjaga kearifan lokal dan keindahan alamnya.
                            </p>
                            <div className="flex gap-4">
                                {['facebook', 'twitter', 'instagram', 'youtube'].map(social => (
                                    <a key={social} href="#" className="w-10 h-10 rounded-full glass flex items-center justify-center text-krem hover:bg-emas-dayak hover:text-hitam-arang transition-all">
                                        <i className={`fab fa-${social}`}></i>
                                    </a>
                                ))}
                            </div>
                        </div>

                        <div>
                            <h4 className="font-display text-lg font-bold text-emas-dayak mb-6">Navigasi</h4>
                            <ul className="space-y-3">
                                {['Beranda', 'Sejarah', 'Budaya', 'Kuliner', 'Wisata', 'Peta'].map(item => (
                                    <li key={item}>
                                        <a href={`#${item.toLowerCase()}`} className="text-krem-gelap hover:text-emas-dayak transition-colors flex items-center gap-2">
                                            <i className="fas fa-chevron-right text-xs text-emas-dayak/50"></i>
                                            {item}
                                        </a>
                                    </li>
                                ))}
                            </ul>
                        </div>

                        <div>
                            <h4 className="font-display text-lg font-bold text-emas-dayak mb-6">Kontak</h4>
                            <ul className="space-y-4">
                                <li className="flex items-start gap-3 text-krem-gelap">
                                    <i className="fas fa-map-marker-alt text-emas-dayak mt-1"></i>
                                    <span>Jl. Tjilik Riwut Km. 5,<br/>Palangka Raya, Kalimantan Tengah</span>
                                </li>
                                <li className="flex items-center gap-3 text-krem-gelap">
                                    <i className="fas fa-phone text-emas-dayak"></i>
                                    <span>+62 536 322 1234</span>
                                </li>
                                <li className="flex items-center gap-3 text-krem-gelap">
                                    <i className="fas fa-envelope text-emas-dayak"></i>
                                    <span>info@palangkaraya.go.id</span>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <div className="border-t border-white/10 pt-8 flex flex-col md:flex-row items-center justify-between gap-4">
                        <p className="text-krem-gelap text-sm">
                            © 2024 Kota Palangka Raya. Hak Cipta Dilindungi.
                        </p>
                        <div className="flex items-center gap-2 text-krem-gelap text-sm">
                            <span>Dibuat dengan</span>
                            <i className="fas fa-heart text-red-500 animate-pulse"></i>
                            <span>untuk Kalimantan Tengah</span>
                        </div>
                    </div>
                </div>
            </footer>
        );

        // Main App
        const App = () => {
            const [loaded, setLoaded] = useState(false);
            const [activeSection, setActiveSection] = useState('beranda');

            useEffect(() => {
                const handleScroll = () => {
                    const sections = ['beranda', 'sejarah', 'budaya', 'kuliner', 'wisata', 'modern', 'peta'];
                    const scrollPos = window.scrollY + 200;

                    for (const section of sections) {
                        const el = document.getElementById(section);
                        if (el && el.offsetTop <= scrollPos && (el.offsetTop + el.offsetHeight) > scrollPos) {
                            setActiveSection(section);
                            break;
                        }
                    }
                };

                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="bg-hitam-arang min-h-screen text-krem">
                    {!loaded && <LoadingScreen onLoad={() => setLoaded(true)} />}
                    
                    {loaded && (
                        <>
                            <Navigation activeSection={activeSection} />
                            <HeroSection />
                            <SejarahSection />
                            <BudayaSection />
                            <KulinerSection />
                            <WisataSection />
                            <ModernSection />
                            <PetaSection />
                            <Footer />
                        </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
